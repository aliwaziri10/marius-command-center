name: Video Generation
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'
concurrency:
  group: video-generation
  cancel-in-progress: false
permissions:
  contents: read
  issues: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run video generation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          ACE_MUSIC_API_KEY: ${{ secrets.ACE_MUSIC_API_KEY }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/video_generation.py
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Video Generation workflow failed - run #${{ github.run_number }}" \
            --body "The Video Generation workflow failed on $(date -u +%Y-%m-%dT%H:%M:%SZ).
          Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
