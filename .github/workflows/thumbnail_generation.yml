name: Thumbnail Generation
on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'
concurrency:
  group: thumbnail-generation
  cancel-in-progress: false
permissions:
  contents: read
  issues: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install DejaVu fonts (guarantees overlay font exists)
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run thumbnail generation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/thumbnail_generation.py
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Thumbnail Generation workflow failed - run #${{ github.run_number }}" \
            --body "The Thumbnail Generation workflow failed on $(date -u +%Y-%m-%dT%H:%M:%SZ).

          Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
